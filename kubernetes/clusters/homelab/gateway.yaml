apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-crds
  namespace: flux-system
spec:
  interval: 1h
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # We use a post-build substitute or a remote base to fetch the official CRDs
  resources:
    - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.1/standard-install.yaml
