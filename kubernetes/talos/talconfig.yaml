clusterName: homelab
talosVersion: v1.12.6
kubernetesVersion: v1.35.4

allowSchedulingOnControlPlanes: true

# The external endpoint pointing to your HAProxy load balancer
endpoint: https://api.cluster.netbird.cloud:6443

# Ensure the Talos API and Kube API accept the HAProxy domain
additionalApiServerCertSans:
  - api.cluster.netbird.cloud

cniConfig:
  name: none

# ==========================================
# GLOBAL: Applies to ALL nodes
# ==========================================
patches:
  # 1. Enable KubeSpan for native node-to-node encrypted mesh
  - |-
    machine:
      network:
        kubespan:
          enabled: true
          advertiseKubernetesNetworks: false
          allowDownPeerBypass: false
          mtu: 1420
          filters:
            endpoints:
              - 0.0.0.0/0
              - ::/0

  # 2. Enable KubeSpan discovery
  - |-
    cluster:
      discovery:
        enabled: true
  # 3. Resolve the API endpoint locally
  - |-
    machine:
      network:
        extraHostEntries:
          - ip: 159.195.9.89
            aliases:
              - api.cluster.netbird.cloud
  # Disable kube-proxy (Cilium will handle service routing)
  - |-
    cluster:
      proxy:
        disabled: true

# ==========================================
# ROLE: Applies to ALL Control Plane nodes
# ==========================================
controlPlane:
  patches:
    # Add the HAProxy domain to the Talos Machine API certs
    - |-
      machine:
        certSANs:
          - api.cluster.netbird.cloud

nodes:
  - hostname: ncvps01
    installDisk: /dev/vda
    ipAddress: 152.53.149.109
    controlPlane: true
    machineSpec:
      mode: metal
    certSANs:
      - ncvps01
    schematic:
      customization:
        extraKernelArgs:
          - net.ifnames=0
          - console=ttyS0,115200n8
        systemExtensions:
          officialExtensions:
            - siderolabs/amd-ucode
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
            - siderolabs/qemu-guest-agent

    patches:
      - |-
        machine:
          features:
            kubernetesTalosAPIAccess:
             enabled: true

  - hostname: ltc01
    installDisk: /dev/nvme0n1
    ipAddress: 192.168.8.10
    certSANs:
      - ltc01
    controlPlane: true
    machineSpec:
      mode: metal
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/intel-ucode
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools

  - hostname: hp01
    installDiskSelector:
      size: "> 128GB"
    ipAddress: 192.168.8.11
    controlPlane: true
    machineSpec:
      mode: metal
    certSANs:
      - hp01
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/intel-ucode
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
