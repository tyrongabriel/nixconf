---
# 2. Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whois-app
  labels:
    app: whois
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whois
  template:
    metadata:
      labels:
        app: whois
    spec:
      containers:
        - name: whois
          image: linuxserver/whois # A common, reliable whois image
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "200m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
