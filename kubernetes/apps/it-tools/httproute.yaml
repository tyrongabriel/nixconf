apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: it-tools-route
  namespace: it-tools
  annotations:
    # These annotations tell the Authentik proxy outpost about this route
    # The outpost reads these to determine which app to use
spec:
  parentRefs:
    - name: shared-gateway
      namespace: kube-system
  hostnames:
    - "tools.tyrongabriel.com"
  rules:
    - backendRefs:
        # Points to the Authentik proxy outpost service
        # The outpost will forward authenticated requests to whoami internally
        - name: ak-outpost-authentik-embedded-outpost
          namespace: authentik
          port: 9000
