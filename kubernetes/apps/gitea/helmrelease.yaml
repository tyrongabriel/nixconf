apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: gitea
spec:
  interval: 1h
  chart:
    spec:
      chart: gitea
      version: "^12.5.0"
      sourceRef:
        kind: HelmRepository
        name: gitea
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  # # Merge sensitive values dynamically into the Helm release from secrets.sops.yaml
  valuesFrom:
    - kind: Secret
      name: gitea-helm-secrets
      valuesKey: values.yaml

  values:
    # ---------------------------------------------------------
    # Core Gitea Configuration
    # ---------------------------------------------------------
    gitea:
      config:
        oauth2_client:
          ENABLE_AUTO_REGISTRATION: true # Registers users for oauth users
          UPDATE_AVATAR: true # Upon each login will update the avatar matching auth
        service:
          DISABLE_REGISTRATION: false # Must be false so Authentik can "register" the user on first login
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true # Rejects anyone trying to register via standard email/password
          SHOW_REGISTRATION_BUTTON: false # Removes the "Sign Up" button from the
        server:
          DOMAIN: git.tyrongabriel.com
          ROOT_URL: https://git.tyrongabriel.com/
          SSH_DOMAIN: git.tyrongabriel.com
          # To ensure proper traffic routing from your HTTPRoute
          HTTP_PORT: 3000
        database:
          DB_TYPE: postgres
          # CoreOS/CloudNativePG automatically provisions a RW service named <cluster-name>-rw
          NAME: gitea
          USER: gitea
      # ---------------------------------------------------------
      # Auto-link CNPG Secret to Gitea app.ini
      # ---------------------------------------------------------
      additionalConfigFromEnvs:
        - name: GITEA__DATABASE__HOST
          valueFrom:
            secretKeyRef:
              name: gitea-db-app # The auto-generated secret from CNPG
              key: host # The password key inside that secret
        - name: GITEA__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: gitea-db-app # The auto-generated secret from CNPG
              key: password # The password key inside that secret

    # ---------------------------------------------------------
    # Resource Limitations (Small minimums, high limits)
    # ---------------------------------------------------------
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"

    # ---------------------------------------------------------
    # Service and Ingress
    # ---------------------------------------------------------
    ingress:
      enabled: false # Handled externally by your HTTPRoute

    service:
      http:
        type: ClusterIP
        port: 3000

    # ---------------------------------------------------------
    # Persistent Storage (Main Gitea Shared Data)
    # ---------------------------------------------------------
    persistence:
      enabled: true
      storageClass: "longhorn-rc-3"
      size: 15Gi

    # ---------------------------------------------------------
    # High-Availability Database (PostgreSQL HA)
    # ---------------------------------------------------------
    postgresql:
      enabled: false # Disable single-node postgres

    postgresql-ha:
      enabled: false # Disabled internal HA Postgres to use cnpgsql instead

    # ---------------------------------------------------------
    # High-Availability Caching & Queues (Valkey Cluster)
    # ---------------------------------------------------------
    valkey:
      enabled: false # Disable single-node valkey

    valkey-cluster:
      enabled: true
      cluster:
        nodes: 3
        replicas: 0
      valkey:
        resources:
          requests:
            cpu: "25m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "512Mi"
      persistence:
        storageClass: "longhorn-rc-1"
        size: 5Gi
