apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitea-route
  namespace: gitea
spec:
  parentRefs:
    - name: shared-gateway
      namespace: kube-system
  hostnames:
    - "git.tyrongabriel.com"
  rules:
    - backendRefs:
        - name: gitea-http
          port: 3000
