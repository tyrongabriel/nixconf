apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami-ingress
  namespace: default
  annotations:
    # Use your Cloudflare ClusterIssuer name here
    cert-manager.io/cluster-issuer: "cloudflare-issuer"
    # Optional: Force HTTPS
    ingress.cilium.io/force-https: "true"
spec:
  ingressClassName: cilium # Specifically target Cilium
  tls:
    - hosts:
        - whoami.tyrongabriel.com
      secretName: whoami-tls-secret
  rules:
    - host: whoami.tyrongabriel.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80
