apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: reloader
      version: "^2.2.0"
      sourceRef:
        kind: HelmRepository
        name: reloader
        namespace: flux-system
      interval: 10m
  values:
    # Global settings
    reloader:
      # Enable watch for all namespaces or specific ones
      watchGlobally: true
