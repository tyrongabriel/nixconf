apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: "^2026.2.0"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
      interval: 12h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    namespaceOverride: authentik
    global:
      namespaceOverride: authentik

    authentik:
      namespace: authentik
      existingSecret:
        secretName: authentik-secret
      postgresql:
        host: "authentik-db-rw"
        user: file:///postgres-creds/username
        password: file:///postgres-creds/password

    server:
      podAnnotations:
        reloader.stakater.com/auto: "true"
      volumes:
        - name: postgres-creds
          secret:
            secretName: authentik-db-app
      volumeMounts:
        - name: postgres-creds
          mountPath: /postgres-creds
          readOnly: true
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi

    worker:
      podAnnotations:
        reloader.stakater.com/auto: "true"
      volumes:
        - name: postgres-creds
          secret:
            secretName: authentik-db-app
      volumeMounts:
        - name: postgres-creds
          mountPath: /postgres-creds
          readOnly: true
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi
      # # Should Remove the privelege warning
      # containerSecurityContext:
      #   allowPrivilegeEscalation: false
      #   capabilities:
      #     drop:
      #       - ALL
      #   runAsNonRoot: true
      #   seccompProfile:
      #     type: RuntimeDefault

    postgresql:
      enabled: false

    redis:
      enabled: true
      master:
        persistence:
          size: 1Gi
          storageClass: longhorn-rc-1
