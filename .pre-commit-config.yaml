default_install_hook_types:
  - pre-commit
  - commit-msg

# Many thanks to @timkicker for bringing a previously commited secret to my attention!
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
  - repo: https://github.com/astro/deadnix
    rev: v1.3.1
    hooks:
      - id: deadnix
        args: [--edit] # Uncomment to automatically modify files
        stages: [pre-commit]

  - repo: https://github.com/NixOS/nixfmt
    rev: v1.2.0 # Use the latest stable version or commit hash
    hooks:
      - id: nixfmt-nix

